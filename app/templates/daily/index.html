{% extends "base.html" %}

{% block title %}Daily Staffing | CoE Portal{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h1 class="h5 mb-0">Daily Staffing</h1>
    <form method="get" action="{{ url_for('daily_bp.index') }}" class="d-flex gap-2 align-items-center">
      <input type="date" name="date" class="form-control form-control-sm" value="{{ selected_date.isoformat() }}">
      <button type="submit" class="btn btn-sm btn-outline-primary">Go</button>
    </form>
  </div>
  <div class="card-body">
    <div class="d-flex gap-2 mb-3">
      <form method="post" action="{{ url_for('daily_bp.save') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="work_date" value="{{ selected_date.isoformat() }}">
        <button type="submit" class="btn btn-primary">Save Day</button>
      </form>

      <form method="post" action="{{ url_for('daily_bp.add_row') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="work_date" value="{{ selected_date.isoformat() }}">
        <button type="submit" class="btn btn-outline-primary">Add Row</button>
      </form>

      <form method="post" action="{{ url_for('daily_bp.clear_day') }}" onsubmit="return confirm('Clear all rows for this day?');">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="work_date" value="{{ selected_date.isoformat() }}">
        <button type="submit" class="btn btn-outline-danger">Clear Day</button>
      </form>
    </div>

    <form method="post" action="{{ url_for('daily_bp.save') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="work_date" value="{{ selected_date.isoformat() }}">
      {% include "daily/_rows_table.html" %}
      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Save Day</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
